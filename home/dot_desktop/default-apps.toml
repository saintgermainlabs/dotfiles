# Default application associations for GUI hosts (managed by chezmoi).
# Generates ~/.config/mimeapps.list and applies xdg-mime extension defaults.
#
# Values under [mime] and [extension] use a role name from [roles.*]
# (e.g. dev-editor), or a full .desktop id.

[roles.dev-editor]
desktop = "sublime_text.desktop"
name = "Sublime Text"

[roles.multimedia]
desktop = "vlc.desktop"
name = "VLC"

[roles.database]
desktop = "dbeaver-ce.desktop"
name = "DBeaver CE"

[roles.deb-installer]
desktop = "deb-dpkg-install.desktop"
name = "Install Debian Package"

# ── MIME types ───────────────────────────────────────────────────────────────
# Development-related types → dev-editor role (Sublime Text).

[mime]
# Data / config
"application/json" = "dev-editor"
"application/ld+json" = "dev-editor"
