# Role-driven and GUI-driven tool and package definitions.
# Add a new role by adding [tools.<role>] and [packages.<role>] sections.
# GUI-specific entries live in [tools.gui] and [packages.gui] and are merged
# only when the host's data has gui = true.

[tools.common]
"go" = "1.23"
"node" = "22"
"python" = "3.12"
"ripgrep" = "latest"
"fzf" = "latest"
"eza" = "latest"
"bat" = "latest"
"zoxide" = "latest"
"fd" = "latest"

[tools.laptop]
"terraform" = "latest"
"terraform-ls" = "latest"
"lazygit" = "latest"
"lazydocker" = "latest"
"starship" = "latest"

[tools.server]
"lazygit" = "latest"
"starship" = "latest"

[tools.vm]
"lazygit" = "latest"

[tools.container]
"kubectl" = "latest"
"helm" = "latest"
"k9s" = "latest"
"terraform" = "latest"
"lazydocker" = "latest"

[tools.gui]
# GUI-only tools go here (currently none).

[packages.common]
list = [
  "git",
  "curl",
  "build-essential",
  "tmux",
  "htop",
  "btop",
  "ripgrep",
  "fd-find",
  "eza",
  "bat",
  "fzf",
  "zoxide",
  "gettext-base",
]

[packages.laptop]
list = []   # role-specific, non-GUI packages only

[packages.server]
list = [
  "ufw",
  "fail2ban",
  "rsync",
  "vault",
]

[packages.vm]
list = [
  "rsync",
]

[packages.container]
list = [
  "jq",
  "dnsutils",
  "netcat-openbsd",
  "openssl",
  "iputils-ping",
  "iproute2",
  "mtr-tiny",
  "bind9-host",
  "tcpdump",
  "wget",
  "openssh-client",
  "httpie",
]

[packages.gui]
list = [
  "nautilus",
  "nautilus-image-converter",
  "wl-clipboard",
  "zenity",
]

[bootstrap]
# Shell source files to load, in order, relative to $DF_DIR (~/.dotfiles).
# "common" files are loaded regardless of role or shell.
# "shells.<shell>" files are loaded for that specific shell.
# "roles.<role>" files are additionally loaded when matching that role.

common = [
  "common/prompt",
]

[bootstrap.shells]
bash = ["bash/init"]
zsh  = ["zsh/rc", "zsh/init"]

# Late shell integrations — sourced at the very end of .bashrc / .zshrc.
# Tools that must be initialized last (e.g. zoxide) go here.
[bootstrap.late_shells]
bash = ["bash/late-init"]
zsh  = ["zsh/late-init"]

[bootstrap.roles]
laptop = ["laptop/ssh", "laptop/server"]
server = []
vm     = []
devops = ["container/k8s", "container/terraform"]
local  = ["container/k8s", "container/terraform", "local/env"]
remote = ["container/k8s", "container/terraform", "remote/env"]

[servers]
# Public servers (safe to commit). Private IPs and hostnames should be supplied
# via local chezmoi data or environment variables, never committed here.
public = [
  { name = "github", ip = "github.com", user = "git", identity_file = "~/.ssh/id_ed25519_dev" },
  { name = "gitlab", ip = "gitlab.com", user = "git", identity_file = "~/.ssh/id_ed25519_dev" },
]
