name: Publish devcontainer images

on:
  push:
    branches: [main, master]
    paths:
      - .devcontainer/**
      - .github/workflows/devcontainer-base.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: devcontainer-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: primordial
            image: linux-mgmt-primordial
          - target: base
            image: linux-mgmt-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:24.04
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Summary
        run: |
          {
            echo "### Published image"
            echo "- \`ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:24.04\`"
            echo "- \`ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest\`"
            echo "- \`ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
